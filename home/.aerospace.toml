# AeroSpace config
# See: https://nikitabobko.github.io/AeroSpace/guide
# inspired by https://github.com/simonsmith/dotfiles/blob/master/dots/aerospace.toml

config-version = 2

start-at-login = true

#after-startup-command = [
#  'exec-and-forget borders active_color=0xffdedede inactive_color=0x00494d64 width=6'
#]

enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

accordion-padding = 17

default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'

on-focused-monitor-changed = ['move-mouse monitor-lazy-center']
automatically-unhide-macos-hidden-apps = false

persistent-workspaces = ["1", "2", "3", "4", "5","6", "7", "8", "9","M", "Z"]
on-mode-changed = []

[key-mapping]
    preset = 'qwerty'

[gaps]
    inner.horizontal = 3
    inner.vertical =   3
    outer.left =       3
    outer.bottom =     3
    outer.top =        3
    outer.right =      3

[workspace-to-monitor-force-assignment]
    Z = 'secondary'

# Main mode — focus and workspaces only
# Meh (Ctrl+Shift+Option) is triggered via Caps Lock in Karabiner
[mode.main.binding]

    # Focus windows (Meh + HJKL)
    ctrl-alt-shift-h = 'focus left'
    ctrl-alt-shift-j = 'focus down'
    ctrl-alt-shift-k = 'focus up'
    ctrl-alt-shift-l = 'focus right'

    # Switch workspace (Meh + number)
    ctrl-alt-shift-1 = 'workspace 1'
    ctrl-alt-shift-2 = 'workspace 2'
    ctrl-alt-shift-3 = 'workspace 3'
    ctrl-alt-shift-4 = 'workspace 4'
    ctrl-alt-shift-5 = 'workspace 5'
    ctrl-alt-shift-6 = 'workspace 6'
    ctrl-alt-shift-7 = 'workspace 7'
    ctrl-alt-shift-8 = 'workspace 8'
    ctrl-alt-shift-9 = 'workspace 9'
    ctrl-alt-shift-z = 'workspace Z'

    ctrl-alt-shift-enter = 'fullscreen'

    # Quick toggles
    alt-tab = 'focus-back-and-forth'
    ctrl-tab = 'workspace-back-and-forth'
    ctrl-alt-shift-tab = 'focus dfs-next --boundaries-action wrap-around-the-workspace'

    # Enter manage mode (Meh + W)
    ctrl-alt-shift-w = 'mode manage'

# Manage mode — rearrange windows with single keystrokes
[mode.manage.binding]
    esc = 'mode main'

    # Move windows
    h = 'move left'
    j = 'move down'
    k = 'move up'
    l = 'move right'

    # Send window to workspace
    1 = ['move-node-to-workspace 1', 'mode main']
    2 = ['move-node-to-workspace 2', 'mode main']
    3 = ['move-node-to-workspace 3', 'mode main']
    4 = ['move-node-to-workspace 4', 'mode main']
    5 = ['move-node-to-workspace 5', 'mode main']
    6 = ['move-node-to-workspace 6', 'mode main']
    7 = ['move-node-to-workspace 7', 'mode main']
    8 = ['move-node-to-workspace 8', 'mode main']
    9 = ['move-node-to-workspace 9', 'mode main']
    z = ['move-node-to-workspace Z', 'mode main']

    # Layout
    t = 'layout tiles horizontal vertical'
    a = 'layout accordion horizontal vertical'
    f = ['layout floating tiling', 'mode main']
    e = 'balance-sizes'

    # Resize
    o = 'resize smart -50'
    p = 'resize smart +50'

    # Join
    shift-h = 'join-with left'
    shift-j = 'join-with down'
    shift-k = 'join-with up'
    shift-l = 'join-with right'

    # Reset / reload
    r = ['flatten-workspace-tree', 'mode main']
    shift-r = ['reload-config', 'mode main']

    # Move workspace to monitor
    tab = ['move-workspace-to-monitor --wrap-around next', 'mode main']

    # Close all but current
    backspace = ['close-all-windows-but-current', 'mode main']

[[on-window-detected]]
if.app-id = 'org.ferdium.ferdium-app'
run = 'move-node-to-workspace 8'

[[on-window-detected]]
if.app-id = 'com.jetbrains.intellij'
run = 'move-node-to-workspace 3'

[[on-window-detected]]
if.app-id = 'org.pqrs.Karabiner-Elements.Settings'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.apple.finder'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.apple.ScreenSharing'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.google.Chrome.beta'
run = 'move-node-to-workspace 4'

[[on-window-detected]]
if.app-id = 'com.google.Chrome'
run = 'move-node-to-workspace 9'

[[on-window-detected]]
if.app-id = 'com.TickTick.task.mac'
run = 'move-node-to-workspace 5'

[[on-window-detected]]
if.app-id = 'notion.id'
run = 'move-node-to-workspace 5'

[[on-window-detected]]
if.app-id = 'com.vivaldi.Vivaldi.app.coenapkplkmdancohemdleoikaafakdm'
run = 'move-node-to-workspace 6'

[[on-window-detected]]
if.app-id = 'com.anthropic.claudefordesktop'
run = 'move-node-to-workspace 6'

[[on-window-detected]]
if.app-id = 'com.roon.Roon'
run = 'move-node-to-workspace Z'

