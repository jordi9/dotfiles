[mgr]
show_hidden = true

[preview]
max_width = 1920
max_height = 1920

[opener]
glow = [
    # 'block = true' is crucial: it hides Yazi so Glow can take over the terminal screen
    { run = 'glow -p "$@"', block = true, desc = "View with Glow", for = "unix" },
]

