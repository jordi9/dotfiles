#:schema https://docs.jj-vcs.dev/latest/config-schema.json

[user]
name = "Jordi Gerona"
email = "jordi@donky.org"

[ui]
pager = ['delta', '--pager', 'less -FRX']
diff-editor = ":builtin"
default-command = "log"

[template-aliases]
"format_short_signature(signature)" = "format_short_signature_oneline(signature)"

[revsets]
bookmark-advance-to = 'closest_pushable(@)'

[revset-aliases]
# Closest revision that is mutable, described and either non-empty or a merge
'closest_pushable(to)' = '''
  heads(::to & mutable() & ~description(exact:"") & (~empty() | merges()))
'''

[aliases]
gp = ['git', 'push']
gfr = ['util', 'exec', '--', 'sh', '-c', 'jj git fetch && jj rebase -o main']

ba = ['bookmark', 'advance']
bagp = ['util', 'exec', '--', 'sh', '-c', 'jj bookmark advance "$@" && jj git push', 'jj-bagp']

w  = ['workspace']
wt = ['workspace', 'root', '--name']
wl = ['workspace', 'list']
wf = ['workspace', 'forget']
# Create a sibling workspace path <current-root>.<name> with a managed jj workspace name.
wa = ['util', 'exec', '--', 'zsh', '-ic', 'jj-workspace-add "$@"', 'jj-wa']
# Forget a non-default workspace and delete its actual root directory.
wd = ['util', 'exec', '--', 'zsh', '-ic', 'jj-workspace-delete "$@"', 'jj-wd']

