# Persistent Hunk preferences.
# See: https://github.com/modem-dev/hunk#config

# Catppuccin's dark variant; other built-ins include:
# catppuccin-latte, catppuccin-frappe, and catppuccin-macchiato.
theme = "catppuccin-mocha"

watch = true
exclude_untracked = false
line_numbers = true
wrap_lines = true
